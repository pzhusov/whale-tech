<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="WHALE TECH logo">
  <title>WHALE TECH</title>
  <defs>
    <linearGradient id="wt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3DA9FC"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <!-- Stylised whale: rounded body with tail-fin forming a counter-form W -->
  <path d="M10 36 C 10 24, 22 18, 32 18 C 42 18, 52 22, 54 30 C 56 34, 56 38, 54 42 C 50 48, 42 50, 34 50 C 24 50, 16 46, 12 42 C 10 40, 10 38, 10 36 Z"
        fill="url(#wt-grad)"/>
  <!-- Eye -->
  <circle cx="42" cy="32" r="1.6" fill="#0B1E3F"/>
  <!-- Water spout -->
  <path d="M44 18 C 44 12, 47 10, 50 10 M44 16 C 44 12, 41 11, 39 12 M44 14 C 44 11, 46 9, 48 9"
        stroke="url(#wt-grad)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <!-- Counter-form W as tail-fin -->
  <path d="M6 50 L 12 44 L 16 50 L 20 44 L 24 50 L 28 44"
        stroke="#0B1E3F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
</svg>
